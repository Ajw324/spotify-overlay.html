<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 480px; height: 480px; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }

  .display {
    width: 480px; height: 480px; border-radius: 50%;
    background: #121212; overflow: hidden; position: relative;
  }

  .art-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.35;
    transition: background-image 0.8s ease;
  }

  .overlay {
    position: absolute; inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
  }

  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 55px;
    gap: 0;
  }

  .now-playing {
    font-size: 9px; font-weight: 700;
    letter-spacing: 3px; color: #1FD25E;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    margin-bottom: 12px;
  }
  .np-dot { width: 5px; height: 5px; border-radius: 50%; background: #1FD25E; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .art {
    width: 150px; height: 150px; border-radius: 10px;
    overflow: hidden; background: #282828;
    margin-bottom: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .art img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .art-ph svg { width: 44px; height: 44px; opacity: 0.3; }

  .track-name {
    font-size: 20px; font-weight: 700; color: #fff;
    text-align: center; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; margin-bottom: 4px;
  }
  .artist-name {
    font-size: 13px; color: #b3b3b3;
    text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: 100%; margin-bottom: 14px;
  }

  .prog-wrap { width: 100%; margin-bottom: 4px; }
  .prog-track { height: 2px; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .prog-fill { height: 100%; border-radius: 2px; background: #1FD25E; transition: width 0.8s linear; }
  .time-row { display: flex; justify-content: space-between; font-size: 8px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .cbtn {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.6);
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }
  .cbtn svg { width: 14px; height: 14px; fill: currentColor; }
  .cbtn.active { color: #1FD25E; }
  .play-btn { width: 38px; height: 38px; background: #fff; border-radius: 50%; color: #000 !important; }
  .play-btn svg { width: 16px; height: 16px; }

  .auth {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 80px;
  }
  .auth-title { font-size: 16px; font-weight: 700; color: #fff; text-align: center; }
  .auth-sub { font-size: 11px; color: #b3b3b3; text-align: center; line-height: 1.5; }
  .auth-btn {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; color: #000; background: #1FD25E;
    border: none; padding: 9px 22px; border-radius: 50px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="display">
  <div class="art-bg" id="art-bg"></div>
  <div class="overlay"></div>

  <div class="auth" id="auth-view">
    <div class="now-playing"><div class="np-dot"></div>NOW PLAYING</div>
    <div class="auth-title">Connect Spotify</div>
    <div class="auth-sub">Link your account to display what's playing</div>
    <button class="auth-btn" onclick="doAuth()">CONNECT</button>
  </div>

  <div class="content" id="player-view" style="display:none">
    <div class="now-playing"><div class="np-dot"></div>NOW PLAYING</div>
    <div class="art">
      <div class="art-ph" id="art-ph">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <img id="art-img" alt="album art">
    </div>
    <div class="track-name" id="track-name">Nothing playing</div>
    <div class="artist-name" id="artist-name">—</div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="time-row"><span id="t-cur">0:00</span><span id="t-total">0:00</span></div>
    </div>
    <div class="controls">
      <button class="cbtn" id="btn-shuffle" onclick="apiShuffle()">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="cbtn" onclick="apiPrev()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="cbtn play-btn" onclick="apiPlayPause()">
        <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="cbtn" onclick="apiNext()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="cbtn" id="btn-repeat" onclick="apiRepeat()">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID    = 'e02a5267c0cd46f2951b5143315966da';
const REDIRECT_URI = 'https://ajw324.github.io/spotify-overlay.html/spotify-round.html';
const SCOPES = 'user-read-currently-playing user-read-playback-state user-modify-playback-state';
const POLL_MS = 3000;

function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function sha256(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));}
function rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return b64url(a);}
async function doAuth(){const v=rand(64),c=b64url(await sha256(v));localStorage.setItem('pkce_verifier',v);window.location='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,scope:SCOPES,code_challenge_method:'S256',code_challenge:c});}
async function exchangeCode(code){const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,client_id:CLIENT_ID,code_verifier:localStorage.getItem('pkce_verifier')})});const d=await res.json();if(d.access_token){store(d);return true;}return false;}
function store(d){localStorage.setItem('sp_access',d.access_token);localStorage.setItem('sp_refresh',d.refresh_token);localStorage.setItem('sp_expires',Date.now()+d.expires_in*1000);}
async function refresh(){const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:localStorage.getItem('sp_refresh'),client_id:CLIENT_ID})});const d=await res.json();if(d.access_token)store(d);}
async function getToken(){if(Date.now()>parseInt(localStorage.getItem('sp_expires')||0)-60000)await refresh();return localStorage.getItem('sp_access');}
async function api(method,path){const t=await getToken();return fetch('https://api.spotify.com/v1'+path,{method,headers:{Authorization:'Bearer '+t}});}

let isPlaying=false,shuffleState=false,repeatState='off',lastId=null;
async function apiPlayPause(){await api('PUT',isPlaying?'/me/player/pause':'/me/player/play');setTimeout(poll,300);}
async function apiNext(){await api('POST','/me/player/next');setTimeout(poll,300);}
async function apiPrev(){await api('POST','/me/player/previous');setTimeout(poll,300);}
async function apiShuffle(){shuffleState=!shuffleState;await api('PUT',`/me/player/shuffle?state=${shuffleState}`);document.getElementById('btn-shuffle').classList.toggle('active',shuffleState);}
async function apiRepeat(){const s=['off','context','track'];repeatState=s[(s.indexOf(repeatState)+1)%3];await api('PUT',`/me/player/repeat?state=${repeatState}`);document.getElementById('btn-repeat').classList.toggle('active',repeatState!=='off');}
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

async function poll(){
  const token=await getToken();if(!token)return;
  try{
    const res=await fetch('https://api.spotify.com/v1/me/player',{headers:{Authorization:'Bearer '+token}});
    if(res.status===204){setIdle();return;}if(!res.ok)return;
    const d=await res.json();if(!d?.item){setIdle();return;}
    isPlaying=d.is_playing;shuffleState=d.shuffle_state;
    document.getElementById('track-name').textContent=d.item.name;
    document.getElementById('artist-name').textContent=d.item.artists.map(a=>a.name).join(', ');
    document.getElementById('t-cur').textContent=fmt(d.progress_ms);
    document.getElementById('t-total').textContent=fmt(d.item.duration_ms);
    document.getElementById('prog').style.width=Math.min((d.progress_ms/d.item.duration_ms)*100,100).toFixed(2)+'%';
    document.getElementById('btn-shuffle').classList.toggle('active',shuffleState);
    document.getElementById('btn-repeat').classList.toggle('active',repeatState!=='off');
    document.getElementById('play-icon').innerHTML=isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
    if(d.item.id!==lastId){
      lastId=d.item.id;
      const imgs=d.item.album.images;
      const img=document.getElementById('art-img');
      const ph=document.getElementById('art-ph');
      if(imgs?.length){img.src=imgs[0].url;img.style.display='block';ph.style.display='none';document.getElementById('art-bg').style.backgroundImage=`url(${imgs[0].url})`;}
      else{img.style.display='none';ph.style.display='flex';document.getElementById('art-bg').style.backgroundImage='none';}
    }
  }catch(e){console.warn(e);}
}

function setIdle(){document.getElementById('track-name').textContent='Nothing playing';document.getElementById('artist-name').textContent='—';document.getElementById('t-cur').textContent='0:00';document.getElementById('t-total').textContent='0:00';document.getElementById('prog').style.width='0%';lastId=null;}
function showPlayer(){document.getElementById('auth-view').style.display='none';document.getElementById('player-view').style.display='flex';poll();setInterval(poll,POLL_MS);}

async function boot(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){const ok=await exchangeCode(code);window.history.replaceState({},'',window.location.pathname);if(ok){showPlayer();return;}}
  if(localStorage.getItem('sp_access')){showPlayer();return;}
}
boot();
</script>
</body>
</html>
