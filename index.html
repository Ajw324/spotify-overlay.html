<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=Inter:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    width: fit-content; height: fit-content;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  :root {
    --bg:      #121212;
    --bg2:     #1a1a1a;
    --bg3:     #282828;
    --green:   #1FD25E;
    --green2:  #1db954;
    --white:   #ffffff;
    --grey:    #b3b3b3;
    --grey2:   #535353;
  }

  .card {
    width: 520px;
    background: var(--bg);
    border-radius: 12px;
    padding: 16px 20px 14px;
    position: relative;
    overflow: hidden;
  }

  /* subtle top border green glow */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.7;
  }

  .now-playing-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .np-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .main-row {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 14px;
  }

  .art {
    width: 80px; height: 80px; flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg3);
    position: relative;
  }
  .art img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .art-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .art-placeholder svg { width: 36px; height: 36px; opacity: 0.4; }

  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 20px; font-weight: 700;
    color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .artist-name {
    font-size: 13px; font-weight: 400;
    color: var(--grey);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .progress-section { margin-bottom: 10px; }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--grey2);
    margin-bottom: 6px;
  }
  .prog-track {
    height: 4px; background: var(--bg3);
    border-radius: 2px; position: relative; cursor: pointer;
  }
  .prog-fill {
    height: 100%; border-radius: 2px;
    background: var(--green);
    position: relative; transition: width 0.8s linear;
  }
  .prog-fill::after {
    content: '';
    position: absolute; right: -5px; top: -4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--white);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .prog-track:hover .prog-fill::after { opacity: 1; }
  .prog-track:hover .prog-fill { background: var(--green2); }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px;
  }
  .ctrl-group { display: flex; align-items: center; gap: 4px; }

  .cbtn {
    background: none; border: none; cursor: pointer;
    color: var(--grey);
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.15s;
  }
  .cbtn:hover { color: var(--white); transform: scale(1.06); }
  .cbtn svg { width: 18px; height: 18px; fill: currentColor; }
  .cbtn.active { color: var(--green); }

  .play-btn {
    width: 40px; height: 40px;
    background: var(--white);
    border-radius: 50%;
    color: #000 !important;
    transition: transform 0.15s, background 0.15s;
  }
  .play-btn:hover { transform: scale(1.08) !important; background: #e8e8e8; }
  .play-btn svg { width: 18px; height: 18px; }

  .vol-group {
    display: flex; align-items: center; gap: 8px;
  }
  .vol-icon { color: var(--grey); display:flex; }
  .vol-icon svg { width: 16px; height: 16px; fill: currentColor; }
  .vol-track {
    width: 80px; height: 4px;
    background: var(--bg3); border-radius: 2px;
    cursor: pointer; position: relative;
  }
  .vol-fill { height: 100%; border-radius: 2px; background: var(--grey); width: 70%; transition: background 0.15s; }
  .vol-track:hover .vol-fill { background: var(--green); }

  /* auth */
  .auth-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 10px 0 6px;
  }
  .auth-title { font-size: 14px; font-weight: 700; color: var(--white); }
  .auth-sub { font-size: 11px; color: var(--grey); }
  .auth-btn {
    font-family: inherit; font-size: 12px; font-weight: 700;
    letter-spacing: 1px;
    color: #000;
    background: var(--green);
    border: none; padding: 10px 24px; border-radius: 50px;
    cursor: pointer; transition: transform 0.15s, background 0.15s;
  }
  .auth-btn:hover { transform: scale(1.04); background: #1ed760; }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- AUTH -->
  <div id="auth-view">
    <div class="now-playing-label"><div class="np-dot"></div>NOW PLAYING</div>
    <div class="auth-wrap">
      <div class="auth-title">Connect to Spotify</div>
      <div class="auth-sub">Link your account to show what's playing</div>
      <button class="auth-btn" onclick="doAuth()">CONNECT</button>
    </div>
  </div>

  <!-- PLAYER -->
  <div id="player-view" style="display:none">
    <div class="now-playing-label"><div class="np-dot"></div>NOW PLAYING</div>

    <div class="main-row">
      <div class="art">
        <div class="art-placeholder" id="art-ph">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="white"/>
          </svg>
        </div>
        <img id="art-img" alt="album art">
      </div>
      <div class="track-info">
        <div class="track-name"  id="track-name">Nothing playing</div>
        <div class="artist-name" id="artist-name">—</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="prog-track" id="prog-track">
        <div class="prog-fill" id="prog" style="width:0%"></div>
      </div>
      <div class="time-row" style="margin-top:5px; margin-bottom:0;">
        <span id="t-cur">0:00</span><span id="t-total">0:00</span>
      </div>
    </div>

    <div class="controls-row">
      <div class="ctrl-group">
        <button class="cbtn" id="btn-shuffle" onclick="apiShuffle()" title="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
      </div>
      <div class="ctrl-group">
        <button class="cbtn" onclick="apiPrev()" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="cbtn play-btn" id="btn-play" onclick="apiPlayPause()">
          <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="cbtn" onclick="apiNext()" title="Next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="ctrl-group vol-group">
        <div class="vol-icon"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></div>
        <div class="vol-track" id="vol-track" onclick="setVolume(event)">
          <div class="vol-fill" id="vol-fill"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const CLIENT_ID    = 'e02a5267c0cd46f2951b5143315966da';
const REDIRECT_URI = 'https://ajw324.github.io/spotify-overlay.html/';
const SCOPES = 'user-read-currently-playing user-read-playback-state user-modify-playback-state';
const POLL_MS = 3000;
// ────────────────────────────────────────────────────────

function b64url(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
async function sha256(s) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); }
function rand(n) { const a=new Uint8Array(n); crypto.getRandomValues(a); return b64url(a); }

async function doAuth() {
  const verifier = rand(64);
  const challenge = b64url(await sha256(verifier));
  localStorage.setItem('pkce_verifier', verifier);
  window.location = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: 'S256', code_challenge: challenge
  });
}

async function exchangeCode(code) {
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ grant_type:'authorization_code', code, redirect_uri:REDIRECT_URI, client_id:CLIENT_ID, code_verifier:localStorage.getItem('pkce_verifier') })
  });
  const d = await res.json();
  if (d.access_token) { storeTokens(d); return true; }
  return false;
}

function storeTokens(d) {
  localStorage.setItem('sp_access', d.access_token);
  localStorage.setItem('sp_refresh', d.refresh_token);
  localStorage.setItem('sp_expires', Date.now() + d.expires_in * 1000);
}

async function refreshToken() {
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ grant_type:'refresh_token', refresh_token:localStorage.getItem('sp_refresh'), client_id:CLIENT_ID })
  });
  const d = await res.json();
  if (d.access_token) storeTokens(d);
}

async function getToken() {
  if (Date.now() > parseInt(localStorage.getItem('sp_expires')||0) - 60000) await refreshToken();
  return localStorage.getItem('sp_access');
}

async function api(method, path) {
  const token = await getToken();
  return fetch('https://api.spotify.com/v1' + path, { method, headers:{ Authorization:'Bearer '+token } });
}

let isPlaying = false, shuffleState = false, repeatState = 'off', lastId = null;

async function apiPlayPause() { await api('PUT', isPlaying ? '/me/player/pause' : '/me/player/play'); setTimeout(poll, 300); }
async function apiNext()      { await api('POST', '/me/player/next');     setTimeout(poll, 300); }
async function apiPrev()      { await api('POST', '/me/player/previous'); setTimeout(poll, 300); }
async function apiShuffle()   {
  shuffleState = !shuffleState;
  await api('PUT', `/me/player/shuffle?state=${shuffleState}`);
  document.getElementById('btn-shuffle').classList.toggle('active', shuffleState);
}

async function setVolume(e) {
  const rect = document.getElementById('vol-track').getBoundingClientRect();
  const vol = Math.round(Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100)));
  document.getElementById('vol-fill').style.width = vol + '%';
  await api('PUT', `/me/player/volume?volume_percent=${vol}`);
}

function fmt(ms) { const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

async function poll() {
  const token = await getToken(); if (!token) return;
  try {
    const res = await fetch('https://api.spotify.com/v1/me/player', { headers:{ Authorization:'Bearer '+token } });
    if (res.status === 204) { setIdle(); return; }
    if (!res.ok) return;
    const d = await res.json();
    if (!d?.item) { setIdle(); return; }

    isPlaying    = d.is_playing;
    shuffleState = d.shuffle_state;

    document.getElementById('track-name').textContent  = d.item.name;
    document.getElementById('artist-name').textContent = d.item.artists.map(a=>a.name).join(', ');
    document.getElementById('t-cur').textContent   = fmt(d.progress_ms);
    document.getElementById('t-total').textContent = fmt(d.item.duration_ms);
    document.getElementById('prog').style.width = Math.min((d.progress_ms/d.item.duration_ms)*100,100).toFixed(2)+'%';
    document.getElementById('btn-shuffle').classList.toggle('active', shuffleState);

    if (d.device?.volume_percent != null) {
      document.getElementById('vol-fill').style.width = d.device.volume_percent + '%';
    }

    const icon = document.getElementById('play-icon');
    icon.innerHTML = isPlaying
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';

    if (d.item.id !== lastId) {
      lastId = d.item.id;
      const imgs = d.item.album.images;
      const img = document.getElementById('art-img');
      const ph  = document.getElementById('art-ph');
      if (imgs?.length) { img.src=imgs[0].url; img.style.display='block'; ph.style.display='none'; }
      else              { img.style.display='none'; ph.style.display='flex'; }
    }
  } catch(e) { console.warn(e); }
}

function setIdle() {
  document.getElementById('track-name').textContent  = 'Nothing playing';
  document.getElementById('artist-name').textContent = '—';
  document.getElementById('t-cur').textContent   = '0:00';
  document.getElementById('t-total').textContent = '0:00';
  document.getElementById('prog').style.width = '0%';
  lastId = null;
}

async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    const ok = await exchangeCode(code);
    window.history.replaceState({}, '', window.location.pathname);
    if (ok) { show(); return; }
  }
  if (localStorage.getItem('sp_access')) { show(); return; }
  // show auth
}

function show() {
  document.getElementById('auth-view').style.display = 'none';
  document.getElementById('player-view').style.display = 'block';
  poll();
  setInterval(poll, POLL_MS);
}

boot();
</script>
</body>
</html>
